<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Demo Stage Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    .stage {
      display: flex;
      width: 100%;
      height: 100%;
    }
    .pane {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .pane + .pane {
      border-left: 2px solid #333;
    }
    .pane-label {
      background: #222;
      color: #aaa;
      font: 12px monospace;
      padding: 4px 8px;
      flex-shrink: 0;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="pane">
      <div class="pane-label">Mock Chat</div>
      <iframe src="http://localhost:8080/relay-mock-chat.html"></iframe>
    </div>
    <div class="pane">
      <div class="pane-label">Ontosphere</div>
      <iframe src="http://localhost:8080/"></iframe>
    </div>
  </div>
</body>
</html>
